name: Generate contribution snake

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF78B7&color_dots=#FFF7FB,#FFE3F1,#BFEFFF,#B8A7FF,#66DFAE
            dist/github-contribution-grid-snake-ocean.svg?color_snake=#FF78B7&color_dots=#0B1028,#1E2A55,#2563EB,#A78BFA,#2DD4BF

      - name: Publish snake assets
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
