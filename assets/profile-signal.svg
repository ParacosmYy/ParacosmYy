<svg width="980" height="96" viewBox="0 0 980 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile signal banner</title>
  <desc id="desc">Animated signal line for GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="0.42" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .main { font: 800 20px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#1E293B; }
      .sub { font: 700 12px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#64748B; }
      .chip { font: 800 11px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#2563EB; }
      .dash { stroke:url(#line); stroke-width:3; stroke-linecap:round; stroke-dasharray:40 620; animation:flow 4.8s linear infinite; filter:drop-shadow(0 0 8px rgba(96,165,250,.38)); }
      .blink { animation:blink 1.8s ease-in-out infinite; }
      .float { animation:float 3.2s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset:-660; } }
      @keyframes blink { 0%,100% { opacity:.35; } 50% { opacity:1; } }
      @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="94" rx="22" fill="url(#bg)" stroke="#DBEAFE"/>
  <path d="M34 70 C160 26 268 82 388 48 S632 28 754 55 S890 72 946 38" class="dash"/>
  <circle class="blink" cx="48" cy="32" r="7" fill="#2DD4BF"/>
  <text x="68" y="38" class="main">浅色动态控制台启动中</text>
  <text x="68" y="62" class="sub">先看现场，再写结论 · STM32 / EtherCAT / FOC / ROS / BLE runtime online</text>
  <g class="float" transform="translate(722 24)">
    <rect width="78" height="26" rx="13" fill="#EFF6FF" stroke="#60A5FA"/>
    <text x="39" y="18" text-anchor="middle" class="chip">DEBUG</text>
  </g>
  <g class="float" transform="translate(814 24)">
    <rect width="72" height="26" rx="13" fill="#F5F3FF" stroke="#A78BFA"/>
    <text x="36" y="18" text-anchor="middle" class="chip">BUILD</text>
  </g>
  <g class="float" transform="translate(900 24)">
    <rect width="54" height="26" rx="13" fill="#F0FDFA" stroke="#2DD4BF"/>
    <text x="27" y="18" text-anchor="middle" class="chip">OTA</text>
  </g>
</svg>
