<svg width="980" height="230" viewBox="0 0 980 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Activity Panel V3</title>
  <desc id="desc">Local visual frame for GitHub metrics, contribution snake, activity graph, stats and streak panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="0.42" stop-color="#F8FAFC"/>
      <stop offset="0.72" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="trace" x1="52" y1="0" x2="928" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.46" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-25%" width="124%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#60A5FA" flood-opacity="0.11"/>
    </filter>
    <style>
      .title{font:800 25px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B;letter-spacing:0}
      .sub{font:650 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B;letter-spacing:0}
      .name{font:800 14px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A;letter-spacing:0}
      .meta{font:650 10.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B;letter-spacing:0}
      .chip{font:800 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB;letter-spacing:0}
      .slot{fill:rgba(255,255,255,.84);stroke:#DBEAFE;stroke-width:1.1;filter:url(#shadow)}
      .panel{fill:rgba(248,250,252,.72);stroke:#CBD5E1;stroke-width:1;stroke-dasharray:7 9}
      .trace{stroke:url(#trace);stroke-width:3;stroke-linecap:round;stroke-dasharray:34 620;animation:move 4.8s linear infinite;filter:drop-shadow(0 0 8px rgba(96,165,250,.3))}
      .thin{stroke:url(#trace);stroke-width:1.8;stroke-linecap:round;stroke-dasharray:8 10;animation:dash 4s linear infinite;opacity:.72}
      .float{animation:float 3.8s ease-in-out infinite;transform-origin:center}.d2{animation-delay:.22s}.d3{animation-delay:.44s}.d4{animation-delay:.66s}.d5{animation-delay:.88s}
      .blink{animation:blink 1.7s ease-in-out infinite}
      @keyframes move{to{stroke-dashoffset:-654}}
      @keyframes dash{to{stroke-dashoffset:-54}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="228" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <rect class="panel" x="31" y="76" width="918" height="122" rx="20"/>

  <text x="40" y="44" class="title">Dynamic Trace</text>
  <text x="40" y="67" class="sub">local chrome for remote stats - metrics / contribution / activity graph / profile counters</text>
  <g transform="translate(770 30)">
    <rect width="134" height="28" rx="14" fill="#EFF6FF" stroke="#60A5FA"/>
    <circle class="blink" cx="18" cy="14" r="5" fill="#2DD4BF"/>
    <text x="76" y="18" text-anchor="middle" class="chip">TRACE ONLINE</text>
  </g>

  <path class="trace" d="M58 138 C160 92 232 180 334 134 S514 92 620 136 S804 180 922 112"/>
  <path class="thin" d="M128 98 H852"/>
  <path class="thin" d="M128 178 H852"/>

  <g class="float">
    <rect class="slot" x="58" y="103" width="156" height="72" rx="16"/>
    <circle cx="84" cy="129" r="7" fill="#60A5FA"/>
    <text x="104" y="134" class="name">Metrics</text>
    <text x="84" y="156" class="meta">github-metrics.svg</text>
    <rect x="151" y="121" width="38" height="6" rx="3" fill="#DBEAFE"/>
    <rect x="151" y="121" width="26" height="6" rx="3" fill="#60A5FA">
      <animate attributeName="width" values="14;38;14" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g class="float d2">
    <rect class="slot" x="244" y="103" width="156" height="72" rx="16"/>
    <circle cx="270" cy="129" r="7" fill="#A78BFA"/>
    <text x="290" y="134" class="name">Contribution</text>
    <text x="270" y="156" class="meta">snake grid runtime</text>
    <path d="M332 125 C344 115 356 143 370 131" stroke="#A78BFA" stroke-width="2.4" stroke-linecap="round" fill="none">
      <animate attributeName="d" values="M332 125 C344 115 356 143 370 131;M332 131 C344 143 356 115 370 125;M332 125 C344 115 356 143 370 131" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g class="float d3">
    <rect class="slot" x="430" y="94" width="156" height="90" rx="16"/>
    <circle cx="456" cy="123" r="7" fill="#22D3EE"/>
    <text x="476" y="128" class="name">Activity Graph</text>
    <text x="456" y="151" class="meta">area + line signal</text>
    <path d="M456 166 L478 154 L500 160 L522 137 L546 148" stroke="#22D3EE" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <g class="float d4">
    <rect class="slot" x="616" y="103" width="156" height="72" rx="16"/>
    <circle cx="642" cy="129" r="7" fill="#2DD4BF"/>
    <text x="662" y="134" class="name">Stats</text>
    <text x="642" y="156" class="meta">profile counters</text>
    <rect x="712" y="121" width="10" height="34" rx="5" fill="#DBEAFE"/>
    <rect x="730" y="111" width="10" height="44" rx="5" fill="#A7F3D0"/>
    <rect x="748" y="132" width="10" height="23" rx="5" fill="#BFDBFE"/>
  </g>

  <g class="float d5">
    <rect class="slot" x="802" y="103" width="120" height="72" rx="16"/>
    <circle cx="828" cy="129" r="7" fill="#14B8A6"/>
    <text x="848" y="134" class="name">Streak</text>
    <text x="828" y="156" class="meta">continuity gate</text>
  </g>

  <text x="490" y="211" text-anchor="middle" class="sub">统一外链统计的浅色边框、节奏线和信号密度，让动态区看起来像同一套工程仪表盘。</text>
</svg>
