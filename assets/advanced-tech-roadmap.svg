<svg width="980" height="340" viewBox="0 0 980 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 25px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E293B; }
    .sub { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    .stage { font: 800 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
    .meta { font: 500 11px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    .status { font: 800 11px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2563EB; }
    .rail { stroke: #DBEAFE; stroke-width: 6; stroke-linecap: round; }
    .flow { stroke: #60A5FA; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 42 720; animation: flow 4.8s linear infinite; filter: drop-shadow(0 0 10px rgba(96,165,250,.48)); }
    .branch { stroke: #C4B5FD; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 14; animation: dash 3.5s linear infinite; opacity: .85; }
    .card { fill: rgba(255,255,255,.84); stroke: #DBEAFE; stroke-width: 1.1; filter: drop-shadow(0 12px 20px rgba(96,165,250,.10)); }
    .node { animation: float 3.2s ease-in-out infinite; transform-origin: center; }
    .node:nth-of-type(2) { animation-delay: .2s; }
    .node:nth-of-type(3) { animation-delay: .4s; }
    .node:nth-of-type(4) { animation-delay: .6s; }
    .node:nth-of-type(5) { animation-delay: .8s; }
    .node:nth-of-type(6) { animation-delay: 1s; }
    .node:nth-of-type(7) { animation-delay: 1.2s; }
    .halo { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    @keyframes flow { to { stroke-dashoffset: -762; } }
    @keyframes dash { to { stroke-dashoffset: -48; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes pulse { 0%,100% { opacity: .28; transform: scale(1); } 50% { opacity: .62; transform: scale(1.12); } }
  </style>

  <rect x="1" y="1" width="978" height="338" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="45" class="title">Advanced Runtime Roadmap</text>
  <text x="40" y="69" class="sub">当前：EtherCAT；下一阶段：FOC / CiA402 / 多轴同步 / ROS / BLE 低功耗连接。</text>

  <path class="rail" d="M90 184 C205 112 315 112 430 184 S655 256 770 184"/>
  <path class="flow" d="M90 184 C205 112 315 112 430 184 S655 256 770 184"/>
  <path class="branch" d="M430 184 C460 116 520 88 585 92"/>
  <path class="branch" d="M540 224 C600 278 690 282 760 244"/>

  <g class="node">
    <circle class="halo" cx="90" cy="184" r="33" fill="#60A5FA"/>
    <rect class="card" x="38" y="144" width="124" height="82" rx="18"/>
    <circle cx="62" cy="169" r="6" fill="#60A5FA"/>
    <text x="82" y="174" class="stage">EtherCAT</text>
    <text x="62" y="196" class="meta">industrial bus</text>
    <text x="62" y="214" class="status">CURRENT</text>
  </g>

  <g class="node">
    <circle class="halo" cx="252" cy="126" r="30" fill="#A78BFA"/>
    <rect class="card" x="196" y="86" width="132" height="82" rx="18"/>
    <circle cx="220" cy="111" r="6" fill="#A78BFA"/>
    <text x="240" y="116" class="stage">CiA402</text>
    <text x="220" y="138" class="meta">servo profile</text>
    <text x="220" y="156" class="status">NEXT</text>
  </g>

  <g class="node">
    <circle class="halo" cx="430" cy="184" r="32" fill="#2DD4BF"/>
    <rect class="card" x="356" y="144" width="148" height="82" rx="18"/>
    <circle cx="380" cy="169" r="6" fill="#2DD4BF"/>
    <text x="400" y="174" class="stage">Multi-Axis</text>
    <text x="380" y="196" class="meta">sync servo control</text>
    <text x="380" y="214" class="status">TARGET</text>
  </g>

  <g class="node">
    <circle class="halo" cx="585" cy="92" r="30" fill="#38BDF8"/>
    <rect class="card" x="526" y="52" width="136" height="82" rx="18"/>
    <circle cx="550" cy="77" r="6" fill="#38BDF8"/>
    <text x="570" y="82" class="stage">FOC / BLDC</text>
    <text x="550" y="104" class="meta">SVPWM / current loop</text>
    <text x="550" y="122" class="status">LEARNING</text>
  </g>

  <g class="node">
    <circle class="halo" cx="540" cy="224" r="30" fill="#818CF8"/>
    <rect class="card" x="486" y="230" width="132" height="82" rx="18"/>
    <circle cx="510" cy="255" r="6" fill="#818CF8"/>
    <text x="530" y="260" class="stage">ROS / ROS2</text>
    <text x="510" y="282" class="meta">robot stack bridge</text>
    <text x="510" y="300" class="status">LATER</text>
  </g>

  <g class="node">
    <circle class="halo" cx="770" cy="184" r="31" fill="#14B8A6"/>
    <rect class="card" x="704" y="144" width="140" height="82" rx="18"/>
    <circle cx="728" cy="169" r="6" fill="#14B8A6"/>
    <text x="748" y="174" class="stage">BLE Low Power</text>
    <text x="728" y="196" class="meta">wireless runtime</text>
    <text x="728" y="214" class="status">LATER</text>
  </g>

  <g class="node">
    <rect class="card" x="716" y="238" width="168" height="58" rx="16"/>
    <circle cx="740" cy="261" r="6" fill="#7C3AED"/>
    <text x="760" y="266" class="stage">Closed Loop</text>
    <text x="740" y="286" class="meta">observe -> control -> verify</text>
  </g>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F7FF"/>
      <stop offset="0.32" stop-color="#F5F3FF"/>
      <stop offset="0.68" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
  </defs>
</svg>
