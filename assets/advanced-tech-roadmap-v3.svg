<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">V3 advanced roadmap</title><desc id="desc">Refined advanced embedded learning roadmap.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="360"><stop stop-color="#E0F7FF"/><stop offset=".38" stop-color="#F5F3FF"/><stop offset=".72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset=".5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.stage{font:900 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 10.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.status{font:900 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}.rail{stroke:#DBEAFE;stroke-width:7;stroke-linecap:round}.flow{stroke:url(#flow);stroke-width:7;stroke-linecap:round;stroke-dasharray:44 740;animation:flow 5.2s linear infinite;filter:drop-shadow(0 0 10px rgba(96,165,250,.42))}.branch{stroke:#A78BFA;stroke-width:3;stroke-linecap:round;stroke-dasharray:10 14;animation:dash 3.8s linear infinite}.card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 12px 20px rgba(96,165,250,.10))}.node{animation:float 3.2s ease-in-out infinite}.halo{animation:pulse 2.6s ease-in-out infinite;transform-origin:center}@keyframes flow{to{stroke-dashoffset:-784}}@keyframes dash{to{stroke-dashoffset:-48}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes pulse{0%,100%{opacity:.26;transform:scale(1)}50%{opacity:.58;transform:scale(1.14)}}</style></defs><rect x="1" y="1" width="978" height="358" rx="28" fill="url(#bg)" stroke="#E0F2FE"/><text x="40" y="48" class="title">Advanced Runtime Roadmap</text><text x="40" y="72" class="sub">当前 EtherCAT；下一阶段 FOC / CiA402 / 多轴同步；后续 ROS / BLE 低功耗连接。</text><path class="rail" d="M92 206 C196 120 318 120 430 204 S660 292 786 188"/><path class="flow" d="M92 206 C196 120 318 120 430 204 S660 292 786 188"/><path class="branch" d="M430 204 C462 122 528 94 606 96"/><path class="branch" d="M562 246 C628 306 720 304 800 260"/>
