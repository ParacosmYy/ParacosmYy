<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Advanced Runtime Roadmap</title>
  <desc id="desc">Four spacious stages for advanced embedded learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="360">
      <stop stop-color="#E0F7FF"/><stop offset="0.38" stop-color="#F5F3FF"/><stop offset="0.72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}
      .sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .stage{font:900 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}
      .meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .status{font:900 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}
      .card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.10))}
      .rail{stroke:#DBEAFE;stroke-width:5;stroke-linecap:round;opacity:.78}
      .flow{stroke:url(#flow);stroke-width:5;stroke-linecap:round;stroke-dasharray:46 760;animation:flow 5.6s linear infinite;filter:drop-shadow(0 0 10px rgba(96,165,250,.28))}
      .float{animation:float 4s ease-in-out infinite}
      .pulse{animation:pulse 2.2s ease-in-out infinite}
      @keyframes flow{to{stroke-dashoffset:-806}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="358" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="48" class="title">Advanced Runtime Roadmap</text>
  <text x="40" y="72" class="sub">从工业通信进入运动控制，再到伺服同步和机器人连接；每一段只放一个主目标。</text>
  <path class="rail" d="M82 286 H898"/>
  <path class="flow" d="M82 286 H898"/>

  <g class="float">
    <rect class="card" x="58" y="116" width="200" height="132" rx="20"/>
    <circle class="pulse" cx="92" cy="148" r="8" fill="#60A5FA"/>
    <text x="118" y="153" class="stage">EtherCAT</text>
    <text x="92" y="184" class="meta">当前主线</text>
    <text x="92" y="207" class="meta">CoE / process data</text>
    <text x="92" y="230" class="status">CURRENT</text>
  </g>
  <g class="float" style="animation-delay:.22s">
    <rect class="card" x="282" y="116" width="200" height="132" rx="20"/>
    <circle class="pulse" cx="316" cy="148" r="8" fill="#A78BFA" style="animation-delay:.2s"/>
    <text x="342" y="153" class="stage">FOC / BLDC</text>
    <text x="316" y="184" class="meta">电机控制入口</text>
    <text x="316" y="207" class="meta">SVPWM / PID / current loop</text>
    <text x="316" y="230" class="status">NEXT</text>
  </g>
  <g class="float" style="animation-delay:.44s">
    <rect class="card" x="506" y="116" width="200" height="132" rx="20"/>
    <circle class="pulse" cx="540" cy="148" r="8" fill="#22D3EE" style="animation-delay:.4s"/>
    <text x="566" y="153" class="stage">CiA402 Servo</text>
    <text x="540" y="184" class="meta">伺服轮廓</text>
    <text x="540" y="207" class="meta">homing / sync / multi-axis</text>
    <text x="540" y="230" class="status">NEXT+</text>
  </g>
  <g class="float" style="animation-delay:.66s">
    <rect class="card" x="730" y="116" width="200" height="132" rx="20"/>
    <circle class="pulse" cx="764" cy="148" r="8" fill="#2DD4BF" style="animation-delay:.6s"/>
    <text x="790" y="153" class="stage">Robot Link</text>
    <text x="764" y="184" class="meta">连接与机器人</text>
    <text x="764" y="207" class="meta">ROS / ROS2 / BLE low power</text>
    <text x="764" y="230" class="status">LATER</text>
  </g>
</svg>
