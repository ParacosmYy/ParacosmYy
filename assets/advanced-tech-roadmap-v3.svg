<svg width="980" height="390" viewBox="0 0 980 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Advanced runtime roadmap</title><desc id="desc">Spacious advanced embedded roadmap.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="390"><stop stop-color="#E0F7FF"/><stop offset="0.38" stop-color="#F5F3FF"/><stop offset="0.72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.stage{font:900 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 10.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.status{font:900 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}.rail{stroke:#DBEAFE;stroke-width:7;stroke-linecap:round}.flow{stroke:url(#flow);stroke-width:7;stroke-linecap:round;stroke-dasharray:46 760;animation:flow 5.6s linear infinite;filter:drop-shadow(0 0 10px rgba(96,165,250,.35))}.branch{stroke:#A78BFA;stroke-width:3;stroke-linecap:round;stroke-dasharray:10 16;animation:dash 4.2s linear infinite;opacity:.72}.card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.10))}.node{animation:float 4s ease-in-out infinite}.halo{animation:pulse 3s ease-in-out infinite;transform-origin:center}@keyframes flow{to{stroke-dashoffset:-806}}@keyframes dash{to{stroke-dashoffset:-52}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes pulse{0%,100%{opacity:.24;transform:scale(1)}50%{opacity:.52;transform:scale(1.1)}}</style></defs>
  <rect x="1" y="1" width="978" height="388" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="48" class="title">Advanced Runtime Roadmap</text><text x="40" y="72" class="sub">当前 EtherCAT；下一阶段 FOC / CiA402 / 多轴同步；后续 ROS / BLE 低功耗连接。</text>
  <path class="rail" d="M95 210 C210 122 328 122 442 208 S662 292 805 190"/>
  <path class="flow" d="M95 210 C210 122 328 122 442 208 S662 292 805 190"/>
  <path class="branch" d="M442 208 C475 126 540 96 624 98"/>
  <path class="branch" d="M570 256 C640 318 735 318 820 272"/>
  <g class="node"><circle class="halo" cx="95" cy="210" r="34" fill="#60A5FA"/><rect class="card" x="40" y="168" width="130" height="88" rx="18"/><text x="64" y="198" class="stage">EtherCAT</text><text x="64" y="220" class="meta">industrial bus</text><text x="64" y="240" class="status">CURRENT</text></g>
  <g class="node"><rect class="card" x="225" y="92" width="132" height="88" rx="18"/><text x="249" y="122" class="stage">FOC / BLDC</text><text x="249" y="144" class="meta">current loop</text><text x="249" y="164" class="status">NEXT</text></g>
  <g class="node"><rect class="card" x="388" y="168" width="132" height="88" rx="18"/><text x="412" y="198" class="stage">CiA402</text><text x="412" y="220" class="meta">servo profile</text><text x="412" y="240" class="status">LEARNING</text></g>
  <g class="node"><rect class="card" x="570" y="72" width="150" height="88" rx="18"/><text x="594" y="102" class="stage">Multi-Axis</text><text x="594" y="124" class="meta">sync / homing</text><text x="594" y="144" class="status">NEXT+</text></g>
  <g class="node"><rect class="card" x="635" y="278" width="132" height="82" rx="18"/><text x="659" y="307" class="stage">ROS / ROS2</text><text x="659" y="329" class="meta">robot bridge</text><text x="659" y="349" class="status">LATER</text></g>
  <g class="node"><rect class="card" x="820" y="150" width="120" height="82" rx="18"/><text x="844" y="179" class="stage">BLE</text><text x="844" y="201" class="meta">low power</text><text x="844" y="221" class="status">LATER</text></g>
</svg>