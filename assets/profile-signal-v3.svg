<svg width="980" height="112" viewBox="0 0 980 112" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GS-Paracosm signal</title>
  <desc id="desc">A sparse animated profile signal bar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="112">
      <stop stop-color="#EFF6FF"/>
      <stop offset=".46" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#60A5FA"/><stop offset=".52" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .main{font:900 21px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}
      .sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .chip{font:900 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}
      .rail{stroke:url(#flow);stroke-width:3;stroke-linecap:round;stroke-dasharray:54 720;animation:flow 5s linear infinite;filter:drop-shadow(0 0 8px rgba(96,165,250,.35))}
      .dot{animation:pulse 2s ease-in-out infinite}
      .float{animation:float 3.8s ease-in-out infinite}
      @keyframes flow{to{stroke-dashoffset:-774}}
      @keyframes pulse{0%,100%{opacity:.38}50%{opacity:1}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="110" rx="24" fill="url(#bg)" stroke="#DBEAFE"/>
  <path class="rail" d="M42 83 C184 44 296 88 420 58 S630 34 766 66 S888 82 942 46"/>
  <circle class="dot" cx="50" cy="36" r="7" fill="#2DD4BF"/>
  <text x="70" y="42" class="main">Light Runtime Signal Online</text>
  <text x="70" y="67" class="sub">先看现场，再写结论 · MCU / EtherCAT / FOC / CiA402 / ROS / BLE</text>

  <g class="float" transform="translate(686 27)">
    <rect width="246" height="36" rx="18" fill="rgba(255,255,255,.74)" stroke="#BFDBFE"/>
    <circle class="dot" cx="25" cy="18" r="5" fill="#60A5FA"/>
    <text x="58" y="23" text-anchor="middle" class="chip">DEBUG</text>
    <path d="M92 9 V27" stroke="#DBEAFE"/>
    <circle class="dot" cx="115" cy="18" r="5" fill="#A78BFA" style="animation-delay:.25s"/>
    <text x="148" y="23" text-anchor="middle" class="chip">BUILD</text>
    <path d="M180 9 V27" stroke="#DBEAFE"/>
    <circle class="dot" cx="202" cy="18" r="5" fill="#2DD4BF" style="animation-delay:.5s"/>
    <text x="224" y="23" text-anchor="middle" class="chip">FLOW</text>
  </g>
</svg>
