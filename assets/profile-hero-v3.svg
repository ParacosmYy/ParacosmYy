<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GS-Paracosm hero</title>
  <desc id="desc">Spacious light cyber embedded runtime hero.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F7FF"/><stop offset="0.36" stop-color="#F5F3FF"/><stop offset="0.72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-120 0;120 0;-120 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
    <style>
      .brand{font:900 60px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#1E293B;letter-spacing:1px}.sub{font:750 18px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#334155}.tiny{font:700 11px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.tag{font:900 13px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#2563EB}.panel{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 12px 22px rgba(96,165,250,.10))}.edge{stroke:url(#flow);stroke-width:2.3;stroke-linecap:round;stroke-dasharray:16 22;animation:dash 5.4s linear infinite}.ring{stroke:#DBEAFE;stroke-width:1.05;stroke-dasharray:8 12;animation:spin 30s linear infinite;transform-origin:600px 180px}.scan{animation:scan 4.8s ease-in-out infinite}.float{animation:float 4.2s ease-in-out infinite}.pulse{animation:pulse 2.8s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-76}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes scan{0%,100%{opacity:.20;transform:translateX(-42px)}50%{opacity:.72;transform:translateX(42px)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes pulse{0%,100%{opacity:.38;transform:scale(1)}50%{opacity:.75;transform:scale(1.08)}}
    </style>
  </defs>
  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <circle cx="1080" cy="78" r="76" fill="#BAE6FD" opacity="0.36" filter="url(#soft)"/>
  <circle cx="118" cy="280" r="86" fill="#C4B5FD" opacity="0.24" filter="url(#soft)"/>
  <circle class="ring" cx="600" cy="180" r="132" fill="none"/>
  <circle class="ring" cx="600" cy="180" r="86" fill="none" style="animation-direction:reverse;animation-duration:38s"/>
  <path class="edge" d="M180 258 C330 144 454 250 600 180 S868 112 1026 244"/>
  <path class="scan" d="M600 58 V292" stroke="url(#flow)" stroke-width="4" stroke-linecap="round"/>

  <text x="600" y="142" text-anchor="middle" class="brand">GS-PARACOSM</text>
  <text x="600" y="177" text-anchor="middle" class="sub">Embedded Firmware Runtime · Motion Control · Industrial Link</text>
  <text x="600" y="205" text-anchor="middle" class="tiny">MCU ECO / PLATFORM ABSTRACTION / ETHERCAT / FOC / CIA402 / ROS / BLE LOW POWER</text>

  <g class="float" transform="translate(70 56)"><rect class="panel" width="250" height="86" rx="20"/><text x="24" y="32" class="tag">MCU ECO</text><text x="24" y="56" class="tiny">STM32 / GD32 / CH32 / AT32</text><text x="24" y="73" class="tiny">PY32 / Renesas RA / APM32</text></g>
  <g class="float" transform="translate(70 210)"><rect class="panel" width="250" height="78" rx="20"/><text x="24" y="31" class="tag">RTOS &amp; BOOT</text><text x="24" y="55" class="tiny">FreeRTOS / RT-Thread / Bootloader / OTA</text></g>
  <g class="float" transform="translate(880 56)"><rect class="panel" width="250" height="86" rx="20"/><text x="24" y="32" class="tag">CONTROL LOOP</text><text x="24" y="56" class="tiny">FOC / BLDC / SVPWM / PID</text><text x="24" y="73" class="tiny">CiA402 / CoE / Multi-Axis</text></g>
  <g class="float" transform="translate(880 210)"><rect class="panel" width="250" height="78" rx="20"/><text x="24" y="31" class="tag">CONNECT &amp; ROBOT</text><circle class="pulse" cx="204" cy="27" r="7" fill="#2DD4BF"/><text x="24" y="55" class="tiny">EtherCAT / ROS2 / BLE / Robot Bridge</text></g>
</svg>
