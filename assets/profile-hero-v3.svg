<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GS-Paracosm v3 hero</title>
  <desc id="desc">Light cyber embedded runtime hero.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse"><stop stop-color="#E0F7FF"/><stop offset=".36" stop-color="#F5F3FF"/><stop offset=".72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/><animateTransform attributeName="gradientTransform" type="translate" values="-120 0;120 0;-120 0" dur="10s" repeatCount="indefinite"/></linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset=".5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
    <style>
      .brand{font:900 62px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#1E293B;letter-spacing:1px}.sub{font:700 18px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#334155}.tiny{font:700 11px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#64748B}.tag{font:900 13px 'Segoe UI','Microsoft YaHei',Arial,sans-serif;fill:#2563EB}.panel{fill:rgba(255,255,255,.84);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 14px 24px rgba(96,165,250,.11))}.edge{stroke:url(#flow);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:14 18;animation:dash 4.8s linear infinite}.ring{stroke:#DBEAFE;stroke-width:1.1;stroke-dasharray:8 10;animation:spin 26s linear infinite;transform-origin:600px 160px}.scan{animation:scan 4s ease-in-out infinite}.float{animation:float 3.6s ease-in-out infinite}.pulse{animation:pulse 2.4s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-64}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes scan{0%,100%{opacity:.25;transform:translateX(-50px)}50%{opacity:.85;transform:translateX(50px)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes pulse{0%,100%{opacity:.38;transform:scale(1)}50%{opacity:.75;transform:scale(1.1)}}
    </style>
  </defs>
  <rect width="1200" height="320" rx="30" fill="url(#bg)"/>
  <circle cx="1080" cy="64" r="70" fill="#BAE6FD" opacity=".42" filter="url(#soft)"/><circle cx="108" cy="245" r="86" fill="#C4B5FD" opacity=".28" filter="url(#soft)"/>
  <circle class="ring" cx="600" cy="160" r="128" fill="none"/><circle class="ring" cx="600" cy="160" r="86" fill="none" style="animation-direction:reverse;animation-duration:34s"/>
  <path class="edge" d="M170 224 C312 126 424 236 600 160 S882 94 1036 204"/>
  <path class="scan" d="M600 42 V278" stroke="url(#flow)" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="132" text-anchor="middle" class="brand">GS-PARACOSM</text>
  <text x="600" y="166" text-anchor="middle" class="sub">Embedded Firmware Runtime · Motion Control · Industrial Link</text>
  <text x="600" y="194" text-anchor="middle" class="tiny">MCU ECO / PLATFORM ABSTRACTION / ETHERCAT / FOC / CIA402 / ROS / BLE LOW POWER</text>
  <g class="float" transform="translate(72 54)"><rect class="panel" width="240" height="86" rx="20"/><text x="24" y="32" class="tag">MCU ECO</text><text x="24" y="56" class="tiny">STM32 / GD32 / CH32 / AT32</text><text x="24" y="73" class="tiny">PY32 / Renesas RA / APM32</text></g>
  <g class="float" transform="translate(72 174)"><rect class="panel" width="258" height="78" rx="20"/><text x="24" y="31" class="tag">RTOS & BOOT</text><text x="24" y="55" class="tiny">FreeRTOS / RT-Thread / Bootloader / OTA</text></g>
  <g class="float" transform="translate(890 54)"><rect class="panel" width="250" height="86" rx="20"/><text x="24" y="32" class="tag">CONTROL LOOP</text><text x="24" y="56" class="tiny">FOC / BLDC / SVPWM / PID</text><text x="24" y="73" class="tiny">CiA402 / CoE / Multi-Axis Sync</text></g>
  <g class="float" transform="translate(872 174)"><rect class="panel" width="268" height="78" rx="20"/><text x="24" y="31" class="tag">CONNECT & ROBOT</text><circle class="pulse" cx="220" cy="27" r="7" fill="#2DD4BF"/><text x="24" y="55" class="tiny">EtherCAT / ROS2 / BLE / Robot Bridge</text></g>
  <g transform="translate(392 236)"><rect width="90" height="28" rx="14" fill="#EFF6FF" stroke="#60A5FA"/><text x="45" y="19" text-anchor="middle" class="tiny">BOOT</text><rect x="106" width="104" height="28" rx="14" fill="#F5F3FF" stroke="#A78BFA"/><text x="158" y="19" text-anchor="middle" class="tiny">MOTION</text><rect x="226" width="92" height="28" rx="14" fill="#ECFEFF" stroke="#22D3EE"/><text x="272" y="19" text-anchor="middle" class="tiny">SERVO</text><rect x="334" width="112" height="28" rx="14" fill="#F0FDFA" stroke="#2DD4BF"/><text x="390" y="19" text-anchor="middle" class="tiny">ROBOTICS</text></g>
</svg>
