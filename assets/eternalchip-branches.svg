<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 700 24px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E293B; }
    .sub { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    .name { font: 700 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
    .meta { font: 500 11px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    .wire { stroke: #C7D2FE; stroke-width: 3; stroke-linecap: round; }
    .live { stroke: #60A5FA; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 22 420; animation: flow 3.8s linear infinite; filter: drop-shadow(0 0 8px rgba(96,165,250,.5)); }
    .node rect { fill: rgba(255,255,255,.72); stroke: #DBEAFE; stroke-width: 1.1; }
    .node { animation: float 3.2s ease-in-out infinite; }
    .node:nth-of-type(2) { animation-delay: .15s; }
    .node:nth-of-type(3) { animation-delay: .3s; }
    .node:nth-of-type(4) { animation-delay: .45s; }
    .node:nth-of-type(5) { animation-delay: .6s; }
    .node:nth-of-type(6) { animation-delay: .75s; }
    .node:nth-of-type(7) { animation-delay: .9s; }
    .node:nth-of-type(8) { animation-delay: 1.05s; }
    @keyframes flow { to { stroke-dashoffset: -442; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  </style>

  <rect x="1" y="1" width="978" height="298" rx="24" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="45" class="title">GS_ETERNALCHIP Branch Map</text>
  <text x="40" y="68" class="sub">每个分支保留明确用途：从 LED 驱动到 FreeRTOS，再到 Bootloader / OTA。</text>

  <path class="wire" d="M132 148 H272"/>
  <path class="wire" d="M272 148 V92 H410"/>
  <path class="wire" d="M272 148 H410"/>
  <path class="wire" d="M272 148 V210 H410"/>
  <path class="wire" d="M548 148 H685"/>
  <path class="wire" d="M685 148 V92 H828"/>
  <path class="wire" d="M685 148 V210 H828"/>

  <path class="live" d="M132 148 H272 V92 H410"/>
  <path class="live" d="M132 148 H410" style="animation-delay:.7s"/>
  <path class="live" d="M132 148 H272 V210 H410" style="animation-delay:1.4s"/>
  <path class="live" d="M548 148 H685 V92 H828" style="animation-delay:2.1s"/>
  <path class="live" d="M548 148 H685 V210 H828" style="animation-delay:2.8s"/>

  <g class="node">
    <rect x="40" y="112" width="132" height="72" rx="16"/>
    <circle cx="62" cy="134" r="6" fill="#60A5FA"/>
    <text x="82" y="139" class="name">master</text>
    <text x="62" y="162" class="meta">collection entry</text>
  </g>

  <g class="node">
    <rect x="410" y="56" width="138" height="72" rx="16"/>
    <circle cx="432" cy="78" r="6" fill="#A78BFA"/>
    <text x="452" y="83" class="name">LED_Initial</text>
    <text x="432" y="106" class="meta">bring-up baseline</text>
  </g>

  <g class="node">
    <rect x="410" y="112" width="138" height="72" rx="16"/>
    <circle cx="432" cy="134" r="6" fill="#2DD4BF"/>
    <text x="452" y="139" class="name">LED_Driver</text>
    <text x="432" y="162" class="meta">driver layer</text>
  </g>

  <g class="node">
    <rect x="410" y="190" width="174" height="72" rx="16"/>
    <circle cx="432" cy="212" r="6" fill="#38BDF8"/>
    <text x="452" y="217" class="name">LED_Bridge_Pattern</text>
    <text x="432" y="240" class="meta">pattern experiment</text>
  </g>

  <g class="node">
    <rect x="612" y="112" width="146" height="72" rx="16"/>
    <circle cx="634" cy="134" r="6" fill="#818CF8"/>
    <text x="654" y="139" class="name">FreeRTOS UART</text>
    <text x="634" y="162" class="meta">task output path</text>
  </g>

  <g class="node">
    <rect x="828" y="56" width="112" height="72" rx="16"/>
    <circle cx="850" cy="78" r="6" fill="#14B8A6"/>
    <text x="870" y="83" class="name">Bootloader</text>
    <text x="850" y="106" class="meta">startup chain</text>
  </g>

  <g class="node">
    <rect x="828" y="190" width="112" height="72" rx="16"/>
    <circle cx="850" cy="212" r="6" fill="#2563EB"/>
    <text x="870" y="217" class="name">OTA Secure</text>
    <text x="850" y="240" class="meta">upgrade flow</text>
  </g>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F9FF"/>
      <stop offset="0.35" stop-color="#F5F3FF"/>
      <stop offset="0.7" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
</svg>
