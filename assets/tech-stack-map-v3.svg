<svg width="980" height="500" viewBox="0 0 980 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech stack map</title><desc id="desc">Spacious embedded tech stack map.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="500"><stop stop-color="#E0F7FF"/><stop offset="0.38" stop-color="#F5F3FF"/><stop offset="0.72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.core{font:900 19px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.name{font:900 14px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 10.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}.corecard{fill:rgba(248,250,252,.96);stroke:#A78BFA;stroke-width:1.7;filter:drop-shadow(0 0 18px rgba(167,139,250,.20));animation:breathe 3.2s ease-in-out infinite;transform-origin:center}.edge{stroke:url(#flow);stroke-width:2;stroke-linecap:round;stroke-dasharray:12 16;animation:dash 5s linear infinite;opacity:.62}.rail{stroke:#DBEAFE;stroke-width:1;stroke-dasharray:6 10;opacity:.72;animation:dash 8s linear infinite}.node{animation:float 4s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-56}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}</style></defs>
  <rect x="1" y="1" width="978" height="498" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="48" class="title">Tech Stack Control Map</text><text x="40" y="72" class="sub">能力域分层：硬件生态、平台抽象、实时系统、控制通信、机器人连接、启动升级。</text>
  <path class="rail" d="M50 122 H930M50 224 H930M50 326 H930M50 428 H930"/>
  <path class="edge" d="M490 244 L220 138M490 244 L490 138M490 244 L760 138M490 244 L220 342M490 244 L490 342M490 244 L760 342"/>
  <g class="corecard"><rect x="368" y="202" width="244" height="88" rx="24"/><text x="490" y="238" text-anchor="middle" class="core">Firmware Runtime</text><text x="490" y="263" text-anchor="middle" class="sub">C / CMake / Debug / CI</text></g>
  <g class="node"><rect class="card" x="60" y="104" width="320" height="70" rx="18"/><text x="86" y="133" class="name">MCU 生态</text><text x="86" y="156" class="meta">STM32 / GD32 / CH32 / AT32 / PY32 / Renesas RA / APM32</text></g>
  <g class="node"><rect class="card" x="600" y="104" width="320" height="70" rx="18"/><text x="626" y="133" class="name">平台抽象</text><text x="626" y="156" class="meta">HAL / LL / CMSIS / BSP / Driver / OSAL</text></g>
  <g class="node"><rect class="card" x="60" y="206" width="270" height="70" rx="18"/><text x="86" y="235" class="name">工业通信</text><text x="86" y="258" class="meta">EtherCAT / CAN-FD / RS485 / Modbus-RTU</text></g>
  <g class="node"><rect class="card" x="650" y="206" width="270" height="70" rx="18"/><text x="676" y="235" class="name">运动控制</text><text x="676" y="258" class="meta">FOC / BLDC / SVPWM / PID / Current Loop</text></g>
  <g class="node"><rect class="card" x="60" y="308" width="270" height="70" rx="18"/><text x="86" y="337" class="name">伺服方向</text><text x="86" y="360" class="meta">CiA402 / CoE / Multi-Axis Sync / Homing</text></g>
  <g class="node"><rect class="card" x="650" y="308" width="270" height="70" rx="18"/><text x="676" y="337" class="name">连接与机器人</text><text x="676" y="360" class="meta">BLE Low Power / ROS / ROS2 / Robot Bridge</text></g>
  <g class="node"><rect class="card" x="210" y="410" width="230" height="58" rx="18"/><text x="236" y="434" class="name">RTOS</text><text x="236" y="454" class="meta">FreeRTOS / RT-Thread / IPC / FromISR</text></g>
  <g class="node"><rect class="card" x="540" y="410" width="230" height="58" rx="18"/><text x="566" y="434" class="name">启动升级</text><text x="566" y="454" class="meta">Bootloader / IAP / OTA / Watchdog</text></g>
</svg>
