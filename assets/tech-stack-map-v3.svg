<svg width="980" height="440" viewBox="0 0 980 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">V3 tech stack map</title><desc id="desc">Refined light embedded tech stack map.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="440"><stop stop-color="#E0F7FF"/><stop offset=".38" stop-color="#F5F3FF"/><stop offset=".72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset=".5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.core{font:900 20px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.name{font:900 14px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 10.5px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 12px 20px rgba(96,165,250,.1))}.corecard{fill:rgba(248,250,252,.96);stroke:#A78BFA;stroke-width:1.8;filter:drop-shadow(0 0 20px rgba(167,139,250,.24));animation:breathe 2.8s ease-in-out infinite;transform-origin:center}.edge{stroke:url(#flow);stroke-width:2.2;stroke-linecap:round;stroke-dasharray:10 14;animation:dash 4.4s linear infinite;opacity:.72}.ring{stroke:#DBEAFE;stroke-width:1.1;stroke-dasharray:8 10;animation:spin 26s linear infinite;transform-origin:490px 232px}.slow{animation-duration:34s;animation-direction:reverse}.node{animation:float 3.4s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-48}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}</style></defs>
<rect x="1" y="1" width="978" height="438" rx="28" fill="url(#bg)" stroke="#E0F2FE"/><text x="40" y="48" class="title">Tech Stack Control Map</text><text x="40" y="72" class="sub">能力域分层：硬件生态 -> 平台抽象 -> 实时系统 -> 控制/通信/机器人 -> 启动升级。</text>
<circle class="ring" cx="490" cy="232" r="144" fill="none"/><circle class="ring slow" cx="490" cy="232" r="96" fill="none"/>
<path class="edge" d="M490 232 L190 126M490 232 L490 106M490 232 L790 126M490 232 L172 234M490 232 L808 234M490 232 L230 352M490 232 L490 356M490 232 L750 352"/>
<g class="corecard"><rect x="370" y="186" width="240" height="92" rx="24"/><text x="490" y="224" text-anchor="middle" class="core">Firmware Runtime</text><text x="490" y="250" text-anchor="middle" class="sub">C / CMake / Debug / CI</text></g>
<g class="node"><rect class="card" x="52" y="96" width="276" height="70" rx="18"/><text x="78" y="125" class="name">MCU 生态</text><text x="78" y="148" class="meta">STM32 / GD32 / CH32 / AT32 / PY32 / RA / APM32</text></g>
<g class="node"><rect class="card" x="360" y="76" width="260" height="70" rx="18"/><text x="386" y="105" class="name">平台抽象</text><text x="386" y="128" class="meta">HAL / LL / CMSIS / BSP / Driver / OSAL</text></g>
<g class="node"><rect class="card" x="652" y="96" width="276" height="70" rx="18"/><text x="678" y="125" class="name">工业通信</text><text x="678" y="148" class="meta">EtherCAT / CAN-FD / RS485 / Modbus-RTU</text></g>
<g class="node"><rect class="card" x="52" y="204" width="250" height="70" rx="18"/><text x="78" y="233" class="name">运动控制</text><text x="78" y="256" class="meta">FOC / BLDC / SVPWM / PID / Current Loop</text></g>
<g class="node"><rect class="card" x="678" y="204" width="250" height="70" rx="18"/><text x="704" y="233" class="name">伺服方向</text><text x="704" y="256" class="meta">CiA402 / CoE / Multi-Axis Sync / Homing</text></g>
<g class="node"><rect class="card" x="98" y="320" width="264" height="70" rx="18"/><text x="124" y="349" class="name">连接与机器人</text><text x="124" y="372" class="meta">BLE Low Power / ROS / ROS2 / Robot Bridge</text></g>
<g class="node"><rect class="card" x="400" y="324" width="180" height="66" rx="18"/><text x="426" y="352" class="name">RTOS</text><text x="426" y="374" class="meta">FreeRTOS / RT-Thread / IPC</text></g>
<g class="node"><rect class="card" x="618" y="320" width="264" height="70" rx="18"/><text x="644" y="349" class="name">启动升级</text><text x="644" y="372" class="meta">Bootloader / IAP / OTA / Flash / Watchdog</text></g>
</svg>
