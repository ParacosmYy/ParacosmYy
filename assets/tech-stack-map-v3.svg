<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech stack map</title>
  <desc id="desc">A spacious embedded technology stack card grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="560">
      <stop stop-color="#E0F7FF"/><stop offset="0.38" stop-color="#F5F3FF"/><stop offset="0.72" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title{font:900 27px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}
      .sub{font:700 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .name{font:900 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}
      .meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .tag{font:900 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}
      .card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}
      .rail{stroke:url(#flow);stroke-width:3;stroke-linecap:round;stroke-dasharray:42 640;animation:flow 5.4s linear infinite;opacity:.72;filter:drop-shadow(0 0 8px rgba(96,165,250,.28))}
      .grid{stroke:#CBD5E1;stroke-width:1;stroke-dasharray:6 10;opacity:.52;animation:dash 8s linear infinite}
      .float{animation:float 4s ease-in-out infinite}
      .pulse{animation:pulse 2s ease-in-out infinite}
      @keyframes flow{to{stroke-dashoffset:-682}}
      @keyframes dash{to{stroke-dashoffset:-64}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
      @keyframes pulse{0%,100%{opacity:.36}50%{opacity:1}}
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="558" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="48" class="title">Tech Stack Control Map</text>
  <text x="40" y="72" class="sub">嵌入式能力分层：硬件生态、平台抽象、实时系统、工业通信、运动控制、伺服、机器人连接、启动升级。</text>
  <path class="grid" d="M56 112 H924M56 222 H924M56 332 H924M56 442 H924"/>
  <path class="rail" d="M78 506 H902"/>

  <g class="float">
    <rect class="card" x="56" y="104" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="88" cy="134" r="8" fill="#60A5FA"/>
    <text x="116" y="139" class="name">MCU 生态</text>
    <text x="116" y="162" class="meta">STM32 / GD32 / CH32 / AT32 / PY32</text>
    <text x="116" y="180" class="meta">Renesas RA / APM32</text>
  </g>
  <g class="float" style="animation-delay:.12s">
    <rect class="card" x="514" y="104" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="546" cy="134" r="8" fill="#A78BFA"/>
    <text x="574" y="139" class="name">平台抽象</text>
    <text x="574" y="162" class="meta">HAL / LL / CMSIS / BSP / Driver / OSAL</text>
    <text x="574" y="180" class="meta">portable firmware boundary</text>
  </g>
  <g class="float" style="animation-delay:.24s">
    <rect class="card" x="56" y="214" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="88" cy="244" r="8" fill="#22D3EE"/>
    <text x="116" y="249" class="name">工业通信</text>
    <text x="116" y="272" class="meta">EtherCAT / CAN-FD / RS485 / Modbus-RTU</text>
    <text x="116" y="290" class="meta">field bus and device-side protocol</text>
  </g>
  <g class="float" style="animation-delay:.36s">
    <rect class="card" x="514" y="214" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="546" cy="244" r="8" fill="#2DD4BF"/>
    <text x="574" y="249" class="name">运动控制</text>
    <text x="574" y="272" class="meta">FOC / BLDC / SVPWM / PID / Current Loop</text>
    <text x="574" y="290" class="meta">from PWM output to current loop</text>
  </g>
  <g class="float" style="animation-delay:.48s">
    <rect class="card" x="56" y="324" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="88" cy="354" r="8" fill="#818CF8"/>
    <text x="116" y="359" class="name">伺服方向</text>
    <text x="116" y="382" class="meta">CiA402 / CoE / Multi-Axis Sync / Homing</text>
    <text x="116" y="400" class="meta">servo profile and synchronized motion</text>
  </g>
  <g class="float" style="animation-delay:.6s">
    <rect class="card" x="514" y="324" width="410" height="86" rx="18"/>
    <circle class="pulse" cx="546" cy="354" r="8" fill="#14B8A6"/>
    <text x="574" y="359" class="name">连接与机器人</text>
    <text x="574" y="382" class="meta">BLE Low Power / ROS / ROS2 / Robot Bridge</text>
    <text x="574" y="400" class="meta">robot-side communication bridge</text>
  </g>
  <g class="float" style="animation-delay:.72s">
    <rect class="card" x="56" y="434" width="410" height="58" rx="18"/>
    <circle class="pulse" cx="88" cy="463" r="8" fill="#38BDF8"/>
    <text x="116" y="459" class="name">RTOS</text>
    <text x="116" y="480" class="meta">FreeRTOS / RT-Thread / 调度 / IPC / FromISR</text>
  </g>
  <g class="float" style="animation-delay:.84s">
    <rect class="card" x="514" y="434" width="410" height="58" rx="18"/>
    <circle class="pulse" cx="546" cy="463" r="8" fill="#2563EB"/>
    <text x="574" y="459" class="name">启动升级</text>
    <text x="574" y="480" class="meta">Bootloader / IAP / OTA / Flash / Watchdog</text>
  </g>
  <text x="490" y="528" text-anchor="middle" class="tag">FIRMWARE RUNTIME · CONTROL · CONNECTIVITY · UPGRADE</text>
</svg>
