<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Paracosm project orbit</title>
  <desc id="desc">Six GitHub projects orbit around a glowing embedded chip core.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="42%" stop-color="#F8FBFF"/>
      <stop offset="100%" stop-color="#EAF7FF"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#BDF7FF"/>
      <stop offset="70%" stop-color="#FF9FD3"/>
      <stop offset="100%" stop-color="#8D7CFF"/>
    </radialGradient>
    <linearGradient id="orbit" x1="154" y1="116" x2="946" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58C9F1"/>
      <stop offset="0.34" stop-color="#FF78B7"/>
      <stop offset="0.68" stop-color="#FFD66B"/>
      <stop offset="1" stop-color="#66DFAE"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#9ECFEA" flood-opacity=".32"/>
    </filter>
    <style>
      .orbit-line { stroke-dasharray: 12 18; animation: dash 16s linear infinite; }
      .float-a { animation: floatA 5.4s ease-in-out infinite alternate; }
      .float-b { animation: floatB 6.2s ease-in-out infinite alternate; }
      .pulse { animation: pulse 2.8s ease-in-out infinite alternate; }
      .spark { animation: twinkle 2.4s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .spark:nth-of-type(2n) { animation-delay: .7s; }
      .spark:nth-of-type(3n) { animation-delay: 1.2s; }
      @keyframes dash { to { stroke-dashoffset: -360; } }
      @keyframes floatA { from { transform: translateY(-5px); } to { transform: translateY(7px); } }
      @keyframes floatB { from { transform: translateY(6px); } to { transform: translateY(-6px); } }
      @keyframes pulse { from { opacity: .82; transform: scale(.985); } to { opacity: 1; transform: scale(1.015); } }
      @keyframes twinkle { from { opacity: .25; transform: scale(.75); } to { opacity: 1; transform: scale(1.18); } }
    </style>
  </defs>

  <rect width="1100" height="520" rx="38" fill="url(#bg)"/>
  <path d="M0 352C164 260 294 411 479 293C667 174 840 78 1100 146V520H0V352Z" fill="#E7F8FF" opacity=".72"/>
  <path d="M40 90C198 30 330 68 512 184C707 309 868 359 1060 248" stroke="url(#orbit)" stroke-width="62" stroke-opacity=".15" stroke-linecap="round"/>
  <path d="M108 430C260 300 410 421 590 276C746 150 885 64 1018 92" stroke="#FF78B7" stroke-width="34" stroke-opacity=".11" stroke-linecap="round"/>

  <g opacity=".66">
    <circle class="spark" cx="90" cy="76" r="4" fill="#58C9F1"/>
    <circle class="spark" cx="184" cy="148" r="4" fill="#FF78B7"/>
    <circle class="spark" cx="286" cy="72" r="3" fill="#FFD66B"/>
    <circle class="spark" cx="432" cy="58" r="4" fill="#66DFAE"/>
    <circle class="spark" cx="890" cy="78" r="4" fill="#A997FF"/>
    <circle class="spark" cx="1008" cy="170" r="3" fill="#58C9F1"/>
    <path class="spark" d="M945 372l8 21 22 8-22 8-8 22-8-22-21-8 21-8 8-21Z" fill="#FFD66B"/>
    <path class="spark" d="M132 253l7 18 19 7-19 7-7 19-7-19-18-7 18-7 7-18Z" fill="#FF78B7"/>
  </g>

  <g transform="translate(550 258)">
    <ellipse class="orbit-line" rx="410" ry="146" stroke="url(#orbit)" stroke-width="3.4" stroke-opacity=".76"/>
    <ellipse class="orbit-line" rx="345" ry="207" stroke="#FF78B7" stroke-width="2.6" stroke-opacity=".48" transform="rotate(-19)"/>
    <ellipse class="orbit-line" rx="276" ry="116" stroke="#FFD66B" stroke-width="2.4" stroke-opacity=".5" transform="rotate(24)"/>
    <ellipse class="orbit-line" rx="445" ry="188" stroke="#66DFAE" stroke-width="2" stroke-opacity=".34" transform="rotate(11)"/>

    <g>
      <circle cx="410" cy="0" r="10" fill="#58C9F1" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="15s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="-345" cy="0" r="9" fill="#FF78B7" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="rotate" from="62 0 0" to="422 0 0" dur="19s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="276" cy="0" r="8" fill="#FFD66B" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="rotate" from="220 0 0" to="-140 0 0" dur="12s" repeatCount="indefinite"/>
    </g>
  </g>

  <g class="pulse" transform="translate(550 258)" filter="url(#glow)">
    <circle r="92" fill="url(#core)"/>
    <circle r="66" fill="#FFFFFF" opacity=".88"/>
    <rect x="-40" y="-40" width="80" height="80" rx="18" fill="#162145"/>
    <rect x="-24" y="-24" width="48" height="48" rx="10" fill="#58C9F1"/>
    <path d="M-58 0h-46M104 0H58M0-58v-48M0 106V58M-43-43l-34-34M43-43l34-34M-43 43l-34 34M43 43l34 34" stroke="#162145" stroke-width="8" stroke-linecap="round"/>
    <path d="M-24-24h48v48h-48z" stroke="#FFFFFF" stroke-width="3" opacity=".92"/>
  </g>

  <g class="float-a" filter="url(#softShadow)">
    <rect x="72" y="86" width="260" height="76" rx="22" fill="#FFFFFF" stroke="#B9EDFF" stroke-width="2"/>
    <circle cx="112" cy="124" r="17" fill="#58C9F1"/>
    <text x="148" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GS_Smart_car</text>
    <text x="148" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">speed / camera / control</text>
  </g>

  <g class="float-b" filter="url(#softShadow)">
    <rect x="760" y="82" width="272" height="78" rx="22" fill="#FFFFFF" stroke="#FFD6EA" stroke-width="2"/>
    <circle cx="802" cy="121" r="17" fill="#FF78B7"/>
    <text x="838" y="115" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GS_ETERNALCHIP</text>
    <text x="838" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">boot / ota / recovery</text>
  </g>

  <g class="float-b" filter="url(#softShadow)">
    <rect x="78" y="346" width="238" height="76" rx="22" fill="#FFFFFF" stroke="#FFE7A7" stroke-width="2"/>
    <circle cx="118" cy="384" r="17" fill="#FFD66B"/>
    <text x="154" y="378" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GS_Thread</text>
    <text x="154" y="402" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">rtos / ipc / context</text>
  </g>

  <g class="float-a" filter="url(#softShadow)">
    <rect x="786" y="352" width="226" height="76" rx="22" fill="#FFFFFF" stroke="#B9F6DD" stroke-width="2"/>
    <circle cx="826" cy="390" r="17" fill="#66DFAE"/>
    <text x="862" y="384" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GS_Tool</text>
    <text x="862" y="408" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">debug / replay / ci</text>
  </g>

  <g class="float-a" filter="url(#softShadow)">
    <rect x="392" y="38" width="316" height="72" rx="22" fill="#FFFFFF" stroke="#D8CEFF" stroke-width="2"/>
    <circle cx="434" cy="74" r="17" fill="#A997FF"/>
    <text x="470" y="68" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GCC_Cmake_ARM</text>
    <text x="470" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">gcc / cmake / ninja</text>
  </g>

  <g class="float-b" filter="url(#softShadow)">
    <rect x="400" y="414" width="300" height="70" rx="22" fill="#FFFFFF" stroke="#C8F2FF" stroke-width="2"/>
    <circle cx="442" cy="449" r="17" fill="#58C9F1"/>
    <text x="478" y="444" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#34385E">GS_watch</text>
    <text x="478" y="468" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#6D7895">portable terminal experiment</text>
  </g>

  <text x="550" y="247" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900" fill="#34385E">Project Orbit</text>
  <text x="550" y="282" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#5F6B86">six repositories around one firmware core</text>
</svg>
