<svg width="980" height="210" viewBox="0 0 980 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Code principles</title>
  <desc id="desc">Animated engineering principles panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="0.4" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title { font:800 25px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#1E293B; }
      .sub { font:600 12px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#64748B; }
      .name { font:800 15px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#0F172A; }
      .meta { font:600 11px 'Segoe UI','Microsoft YaHei',sans-serif; fill:#64748B; }
      .card { fill:rgba(255,255,255,.84); stroke:#DBEAFE; stroke-width:1.1; filter:drop-shadow(0 12px 20px rgba(96,165,250,.10)); }
      .edge { stroke:url(#line); stroke-width:3; stroke-linecap:round; stroke-dasharray:26 420; animation:flow 4.6s linear infinite; }
      .node { animation:float 3.2s ease-in-out infinite; transform-origin:center; }
      .node:nth-of-type(2){ animation-delay:.2s; } .node:nth-of-type(3){ animation-delay:.4s; } .node:nth-of-type(4){ animation-delay:.6s; }
      @keyframes flow { to { stroke-dashoffset:-446; } }
      @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="208" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="44" class="title">Code Habits</text>
  <text x="40" y="67" class="sub">少一点玄学，多一点现场；少一点堆砌，多一点能维护的工程。</text>
  <path class="edge" d="M92 145 C230 92 332 190 470 136 S728 96 888 145"/>

  <g class="node"><rect class="card" x="64" y="104" width="190" height="70" rx="18"/><text x="92" y="133" class="name">可运行</text><text x="92" y="156" class="meta">代码能跑，也要能查问题</text></g>
  <g class="node"><rect class="card" x="286" y="82" width="210" height="78" rx="18"/><text x="314" y="113" class="name">先抽象</text><text x="314" y="136" class="meta">跨芯片先接口，再适配外设</text></g>
  <g class="node"><rect class="card" x="526" y="82" width="210" height="78" rx="18"/><text x="554" y="113" class="name">先闭环</text><text x="554" y="136" class="meta">运动控制先稳定，再谈性能</text></g>
  <g class="node"><rect class="card" x="766" y="104" width="150" height="70" rx="18"/><text x="794" y="133" class="name">先状态机</text><text x="794" y="156" class="meta">总线同步可复盘</text></g>
</svg>
