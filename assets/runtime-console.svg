<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Runtime console</title><desc id="desc">Spacious runtime console.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="300"><stop stop-color="#E0F7FF"/><stop offset="0.42" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.55" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 26px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:650 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.name{font:900 17px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.card{fill:rgba(255,255,255,.88);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}.line{stroke:url(#flow);stroke-width:3;stroke-linecap:round;stroke-dasharray:36 700;animation:flow 5s linear infinite}.dot{animation:pulse 2s ease-in-out infinite}@keyframes flow{to{stroke-dashoffset:-736}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}</style></defs>
<rect x="1" y="1" width="978" height="298" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
<text x="40" y="48" class="title">Runtime Window</text><text x="40" y="72" class="sub">BOOT / DEBUG / BUILD / STANDBY - clean embedded operation panel</text>
<path class="line" d="M70 150 H910"/>
<g><rect class="card" x="60" y="104" width="390" height="70" rx="18"/><circle class="dot" cx="92" cy="139" r="8" fill="#60A5FA"/><text x="120" y="134" class="name">BOOT &amp; OTA</text><text x="120" y="156" class="meta">Bootloader / IAP / Flash layout</text></g>
<g><rect class="card" x="530" y="104" width="390" height="70" rx="18"/><circle class="dot" cx="562" cy="139" r="8" fill="#A78BFA"/><text x="590" y="134" class="name">DEBUG</text><text x="590" y="156" class="meta">GDB / J-Link / OpenOCD / trace</text></g>
<g><rect class="card" x="60" y="198" width="390" height="70" rx="18"/><circle class="dot" cx="92" cy="233" r="8" fill="#22D3EE"/><text x="120" y="228" class="name">BUILD</text><text x="120" y="250" class="meta">C / CMake / local CI gate</text></g>
<g><rect class="card" x="530" y="198" width="390" height="70" rx="18"/><circle class="dot" cx="562" cy="233" r="8" fill="#2DD4BF"/><text x="590" y="228" class="name">STANDBY</text><text x="590" y="250" class="meta">Low power / watchdog / recovery</text></g>
</svg>