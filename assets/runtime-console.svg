<svg width="980" height="260" viewBox="0 0 980 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Runtime console</title>
  <desc id="desc">Animated light cyber runtime panel for embedded firmware profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F7FF"/>
      <stop offset="0.35" stop-color="#F5F3FF"/>
      <stop offset="0.68" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DCFCE7"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-80 0;80 0;-80 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title { font: 800 24px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E293B; }
      .sub { font: 600 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .label { font: 800 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .meta { font: 600 11px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .line { stroke: #CBD5E1; stroke-width: 1.2; stroke-dasharray: 5 8; animation: dash 4s linear infinite; }
      .card { fill: rgba(255,255,255,.82); stroke: #DBEAFE; stroke-width: 1.1; filter: drop-shadow(0 12px 20px rgba(96,165,250,.10)); }
      .node { animation: float 3.2s ease-in-out infinite; transform-origin: center; }
      .node:nth-of-type(2) { animation-delay: .18s; }
      .node:nth-of-type(3) { animation-delay: .36s; }
      .node:nth-of-type(4) { animation-delay: .54s; }
      .scan { animation: scan 3s ease-in-out infinite; }
      .blink { animation: blink 1.6s ease-in-out infinite; }
      .bar { animation: grow 2.8s ease-in-out infinite; transform-origin: left center; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes scan { 0%,100% { opacity: .2; transform: translateX(-34px); } 50% { opacity: .8; transform: translateX(34px); } }
      @keyframes blink { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes grow { 0%,100% { transform: scaleX(.45); } 50% { transform: scaleX(1); } }
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="258" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="38" y="43" class="title">Runtime Window</text>
  <text x="38" y="66" class="sub">BOOT / OTA / DEBUG / BUILD / STANDBY - light embedded control panel</text>

  <path class="line" d="M126 150 H854"/>
  <path class="scan" d="M490 86 V216" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <g class="node">
    <rect class="card" x="56" y="102" width="178" height="102" rx="18"/>
    <circle class="blink" cx="86" cy="131" r="7" fill="#60A5FA"/>
    <text x="106" y="136" class="label">BOOT &amp; OTA</text>
    <text x="86" y="160" class="meta">Bootloader / IAP / Flash</text>
    <rect x="86" y="178" width="112" height="6" rx="3" fill="#DBEAFE"/>
    <rect class="bar" x="86" y="178" width="112" height="6" rx="3" fill="#60A5FA"/>
  </g>

  <g class="node">
    <rect class="card" x="282" y="92" width="178" height="112" rx="18"/>
    <circle class="blink" cx="312" cy="122" r="7" fill="#A78BFA"/>
    <text x="332" y="127" class="label">DEBUG</text>
    <text x="312" y="151" class="meta">GDB / J-Link / OpenOCD</text>
    <path d="M312 174 H430" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" stroke-dasharray="14 10">
      <animate attributeName="stroke-dashoffset" values="0;-48" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g class="node">
    <rect class="card" x="510" y="92" width="178" height="112" rx="18"/>
    <circle class="blink" cx="540" cy="122" r="7" fill="#22D3EE"/>
    <text x="560" y="127" class="label">BUILD</text>
    <text x="540" y="151" class="meta">C / CMake / CI Gate</text>
    <g transform="translate(540 170)">
      <rect width="20" height="20" rx="5" fill="#E0F2FE" stroke="#38BDF8"/>
      <rect x="30" width="20" height="20" rx="5" fill="#F5F3FF" stroke="#A78BFA"/>
      <rect x="60" width="20" height="20" rx="5" fill="#ECFDF5" stroke="#2DD4BF"/>
    </g>
  </g>

  <g class="node">
    <rect class="card" x="736" y="102" width="178" height="102" rx="18"/>
    <circle class="blink" cx="766" cy="131" r="7" fill="#2DD4BF"/>
    <text x="786" y="136" class="label">STANDBY</text>
    <text x="766" y="160" class="meta">Low Power / Watchdog</text>
    <path d="M766 181 C790 167 812 195 836 181 C852 172 868 173 884 181" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="d" values="M766 181 C790 167 812 195 836 181 C852 172 868 173 884 181;M766 181 C790 195 812 167 836 181 C852 190 868 189 884 181;M766 181 C790 167 812 195 836 181 C852 172 868 173 884 181" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="490" y="235" text-anchor="middle" class="sub">写一点嵌入式，修一点 Bug，偶尔把工程整理得顺眼一点。</text>
</svg>
