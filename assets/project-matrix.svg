<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Project matrix</title>
  <desc id="desc">Animated project matrix for embedded repositories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F7FF"/>
      <stop offset="0.35" stop-color="#F5F3FF"/>
      <stop offset="0.7" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title { font: 800 25px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E293B; }
      .sub { font: 600 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .name { font: 800 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .meta { font: 600 11px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .tag { font: 800 10px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2563EB; }
      .card { fill: rgba(255,255,255,.84); stroke: #DBEAFE; stroke-width: 1.1; filter: drop-shadow(0 12px 20px rgba(96,165,250,.10)); }
      .core { fill: rgba(248,250,252,.94); stroke: #A78BFA; stroke-width: 1.6; filter: drop-shadow(0 0 18px rgba(167,139,250,.22)); animation: breathe 2.8s ease-in-out infinite; transform-origin: center; }
      .edge { stroke: url(#flow); stroke-width: 2.3; stroke-linecap: round; stroke-dasharray: 12 14; animation: dash 4s linear infinite; opacity: .72; }
      .node { animation: float 3.4s ease-in-out infinite; transform-origin: center; }
      .node:nth-of-type(2) { animation-delay: .2s; }
      .node:nth-of-type(3) { animation-delay: .4s; }
      .node:nth-of-type(4) { animation-delay: .6s; }
      .node:nth-of-type(5) { animation-delay: .8s; }
      @keyframes dash { to { stroke-dashoffset: -52; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.018); } }
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="298" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="44" class="title">Project Matrix</text>
  <text x="40" y="67" class="sub">embedded collection / RTOS kernel / debug tool / engineering skills</text>

  <path class="edge" d="M490 150 L232 118"/>
  <path class="edge" d="M490 150 L748 118"/>
  <path class="edge" d="M490 150 L232 224"/>
  <path class="edge" d="M490 150 L748 224"/>

  <g class="core">
    <rect x="372" y="105" width="236" height="92" rx="22"/>
    <text x="490" y="140" text-anchor="middle" class="name">GS_ETERNALCHIP</text>
    <text x="490" y="162" text-anchor="middle" class="meta">embedded project collection</text>
    <text x="490" y="184" text-anchor="middle" class="tag">BOOTLOADER · OTA · BRANCH LAB</text>
  </g>

  <g class="node">
    <rect class="card" x="80" y="82" width="260" height="74" rx="18"/>
    <text x="108" y="112" class="name">GS_Thread</text>
    <text x="108" y="134" class="meta">RT-Thread style kernel clone</text>
  </g>

  <g class="node">
    <rect class="card" x="640" y="82" width="260" height="74" rx="18"/>
    <text x="668" y="112" class="name">GS_Tool</text>
    <text x="668" y="134" class="meta">EmbedDebug field toolbox</text>
  </g>

  <g class="node">
    <rect class="card" x="80" y="188" width="260" height="74" rx="18"/>
    <text x="108" y="218" class="name">GCC_Cmake_ARM</text>
    <text x="108" y="240" class="meta">ARM GCC + CMake template</text>
  </g>

  <g class="node">
    <rect class="card" x="640" y="188" width="260" height="74" rx="18"/>
    <text x="668" y="218" class="name">GS_Skills</text>
    <text x="668" y="240" class="meta">MCU engineering method library</text>
  </g>
</svg>
