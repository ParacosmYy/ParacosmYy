<svg width="1100" height="460" viewBox="0 0 1100 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Paracosm project star map</title>
  <desc id="desc">Animated anime-inspired firmware project orbit map for MCU, RTOS, OTA, tools, and build systems.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#27386F"/>
      <stop offset="44%" stop-color="#10152F"/>
      <stop offset="100%" stop-color="#060816"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="180" y1="70" x2="920" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AF0FF"/>
      <stop offset="0.34" stop-color="#FF85C9"/>
      <stop offset="0.68" stop-color="#FFE174"/>
      <stop offset="1" stop-color="#7DFFCC"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#182047"/>
      <stop offset="1" stop-color="#0B1028"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .spark { transform-box: fill-box; transform-origin: center; animation: twinkle 2.4s ease-in-out infinite alternate; }
      .spark:nth-of-type(2n) { animation-delay: .7s; }
      .spark:nth-of-type(3n) { animation-delay: 1.2s; }
      .float { animation: floaty 4.6s ease-in-out infinite alternate; }
      .float2 { animation: floaty2 5.4s ease-in-out infinite alternate; }
      .dash { stroke-dasharray: 9 14; animation: dash 9s linear infinite; }
      .pulse { animation: pulse 2.6s ease-in-out infinite alternate; }
      @keyframes twinkle { from { opacity: .25; transform: scale(.7); } to { opacity: 1; transform: scale(1.16); } }
      @keyframes floaty { from { transform: translateY(-4px); } to { transform: translateY(7px); } }
      @keyframes floaty2 { from { transform: translateY(6px); } to { transform: translateY(-5px); } }
      @keyframes dash { to { stroke-dashoffset: -230; } }
      @keyframes pulse { from { opacity: .65; } to { opacity: 1; } }
    </style>
  </defs>

  <rect width="1100" height="460" rx="34" fill="url(#bgGlow)"/>
  <path d="M0 355C166 292 255 394 424 322C609 244 688 62 1100 122V460H0V355Z" fill="#111B3C" opacity=".72"/>
  <path d="M65 91C224 38 362 101 516 198C705 316 851 350 1040 260" stroke="url(#ribbon)" stroke-opacity=".26" stroke-width="54" stroke-linecap="round"/>
  <path d="M88 375C268 280 399 406 565 278C706 169 826 72 1010 93" stroke="#7AF0FF" stroke-opacity=".16" stroke-width="32" stroke-linecap="round"/>

  <g opacity=".75">
    <circle class="spark" cx="78" cy="78" r="3" fill="#7AF0FF"/>
    <circle class="spark" cx="164" cy="118" r="4" fill="#FFE174"/>
    <circle class="spark" cx="261" cy="64" r="3" fill="#FF85C9"/>
    <circle class="spark" cx="925" cy="82" r="4" fill="#7DFFCC"/>
    <circle class="spark" cx="1016" cy="154" r="3" fill="#FF85C9"/>
    <circle class="spark" cx="990" cy="355" r="5" fill="#FFE174"/>
    <circle class="spark" cx="106" cy="335" r="4" fill="#7DFFCC"/>
    <circle class="spark" cx="424" cy="72" r="3" fill="#FFFFFF"/>
    <path class="spark" d="M1007 230l6 17 17 6-17 6-6 17-6-17-17-6 17-6 6-17Z" fill="#7AF0FF"/>
    <path class="spark" d="M158 211l8 21 22 8-22 8-8 22-8-22-21-8 21-8 8-21Z" fill="#FF85C9"/>
    <path class="spark" d="M870 386l7 18 19 7-19 7-7 19-7-19-18-7 18-7 7-18Z" fill="#FFE174"/>
  </g>

  <g transform="translate(550 232)">
    <ellipse class="dash" cx="0" cy="0" rx="338" ry="128" stroke="#7AF0FF" stroke-opacity=".62" stroke-width="2.5"/>
    <ellipse class="dash" cx="0" cy="0" rx="286" ry="176" stroke="#FF85C9" stroke-opacity=".48" stroke-width="2" transform="rotate(-17)"/>
    <ellipse class="dash" cx="0" cy="0" rx="236" ry="105" stroke="#FFE174" stroke-opacity=".42" stroke-width="2" transform="rotate(23)"/>
    <g>
      <circle cx="338" cy="0" r="8" fill="#7AF0FF" filter="url(#softGlow)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="16s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="-252" cy="-108" r="7" fill="#FF85C9" filter="url(#softGlow)"/>
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="20s" repeatCount="indefinite"/>
    </g>
  </g>

  <g class="pulse" filter="url(#softGlow)">
    <circle cx="550" cy="232" r="74" fill="#121A3B" stroke="url(#ribbon)" stroke-width="3"/>
    <circle cx="550" cy="232" r="50" fill="#0A1029" stroke="#FFFFFF" stroke-opacity=".2"/>
    <path d="M528 226h44v13h-44v-13Zm8-18h28v12h-28v-12Zm-18 44h64v10h-64v-10Z" fill="#7AF0FF"/>
    <text x="550" y="302" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">GS-Paracosm</text>
  </g>

  <g class="float">
    <rect x="86" y="126" width="260" height="74" rx="18" fill="url(#card)" stroke="#7AF0FF" stroke-opacity=".65"/>
    <text x="116" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">GS_Smart_car</text>
    <text x="116" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#BFE9FF">TC264D / Target boundary / HAL</text>
    <circle cx="314" cy="163" r="14" fill="#7AF0FF" opacity=".2"/>
    <path d="M314 148l5 10 11 2-8 8 2 11-10-5-10 5 2-11-8-8 11-2 5-10Z" fill="#7AF0FF"/>
  </g>

  <g class="float2">
    <rect x="750" y="116" width="266" height="78" rx="18" fill="url(#card)" stroke="#FF85C9" stroke-opacity=".68"/>
    <text x="779" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">GS_ETERNALCHIP</text>
    <text x="779" y="173" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#FFD9EC">OTA / Bootloader / Recovery path</text>
    <path d="M966 139c20 13 16 40-7 45-25 5-42-20-29-41 8-13 24-15 36-4Z" fill="#FF85C9" opacity=".18"/>
    <path d="M959 136l8 16 18 3-13 12 3 18-16-8-16 8 3-18-13-12 18-3 8-16Z" fill="#FF85C9"/>
  </g>

  <g class="float2">
    <rect x="126" y="276" width="238" height="74" rx="18" fill="url(#card)" stroke="#FFE174" stroke-opacity=".66"/>
    <text x="154" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">GS_Thread</text>
    <text x="154" y="330" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#FFF2B6">Scheduler / IPC / Cortex-M port</text>
    <circle cx="324" cy="313" r="17" fill="#FFE174" opacity=".2"/>
    <path d="M324 296l4 13h14l-11 8 4 13-11-8-11 8 4-13-11-8h14l4-13Z" fill="#FFE174"/>
  </g>

  <g class="float">
    <rect x="720" y="284" width="242" height="72" rx="18" fill="url(#card)" stroke="#7DFFCC" stroke-opacity=".66"/>
    <text x="748" y="312" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">GS_Tool</text>
    <text x="748" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#C9FFE9">PyQt6 / Protocol replay / CI</text>
    <circle cx="918" cy="320" r="16" fill="#7DFFCC" opacity=".2"/>
    <path d="M918 304l5 11 12 2-9 8 2 12-10-6-11 6 3-12-9-8 12-2 5-11Z" fill="#7DFFCC"/>
  </g>

  <g class="float">
    <rect x="418" y="42" width="264" height="68" rx="18" fill="url(#card)" stroke="#B397FF" stroke-opacity=".66"/>
    <text x="447" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">Build Galaxy</text>
    <text x="447" y="94" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#E8DDFF">ARM GCC / CMake / Ninja</text>
  </g>

  <g class="float2">
    <rect x="406" y="360" width="288" height="62" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".28"/>
    <text x="550" y="389" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">From runnable to portable</text>
    <text x="550" y="411" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#BFE9FF">clear boundary / verifiable loop / deliverable docs</text>
  </g>

  <text x="62" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" fill="#FFFFFF">Paracosm Project Star Map</text>
  <text x="64" y="91" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#BFE9FF">Anime flavored embedded firmware homepage</text>
</svg>
