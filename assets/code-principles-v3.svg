<svg width="980" height="300" viewBox="0 0 980 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Code Principles V3</title>
  <desc id="desc">Four spacious engineering principles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="300">
      <stop stop-color="#E0F7FF"/><stop offset="0.36" stop-color="#F8FAFC"/><stop offset="0.7" stop-color="#F5F3FF"/><stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="pipe" x1="64" y1="0" x2="916" y2="0">
      <stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title{font:900 25px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}
      .sub{font:650 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .stage{font:850 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}
      .meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}
      .num{font:850 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}
      .gate{font:800 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#475569}
      .card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}
      .rule{fill:rgba(248,250,252,.76);stroke:#CBD5E1;stroke-width:1;stroke-dasharray:6 8}
      .pipe{stroke:url(#pipe);stroke-width:3.2;stroke-linecap:round;stroke-dasharray:36 720;animation:flow 5s linear infinite}
      .thin{stroke:#CBD5E1;stroke-width:1;stroke-dasharray:5 10;animation:dash 7s linear infinite;opacity:.6}
      .float{animation:float 4s ease-in-out infinite}
      .pulse{animation:pulse 1.8s ease-in-out infinite}
      @keyframes flow{to{stroke-dashoffset:-756}}
      @keyframes dash{to{stroke-dashoffset:-60}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="298" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <path class="thin" d="M52 96 H928M52 222 H928"/>
  <text x="40" y="44" class="title">Code Principles V3</text>
  <text x="40" y="67" class="sub">少堆概念，多留证据；需求、接口、状态、验证四件事闭环。</text>
  <g transform="translate(736 30)">
    <rect width="164" height="28" rx="14" fill="#F0FDFA" stroke="#2DD4BF"/>
    <circle class="pulse" cx="18" cy="14" r="5" fill="#2DD4BF"/>
    <text x="88" y="18" text-anchor="middle" class="num">RULE PIPELINE</text>
  </g>
  <path class="pipe" d="M84 164 H896"/>
  <path d="M896 164 L882 156 M896 164 L882 172" stroke="#2DD4BF" stroke-width="3.2" stroke-linecap="round"/>

  <g class="float">
    <rect class="card" x="58" y="112" width="190" height="104" rx="18"/>
    <rect x="82" y="132" width="36" height="22" rx="11" fill="#EFF6FF" stroke="#60A5FA"/>
    <text x="100" y="147" text-anchor="middle" class="num">01</text>
    <text x="82" y="176" class="stage">需求边界</text>
    <text x="82" y="198" class="meta">先定义现场问题和输入输出。</text>
  </g>
  <g class="float" style="animation-delay:.2s">
    <rect class="card" x="285" y="112" width="190" height="104" rx="18"/>
    <rect x="309" y="132" width="36" height="22" rx="11" fill="#F5F3FF" stroke="#A78BFA"/>
    <text x="327" y="147" text-anchor="middle" class="num">02</text>
    <text x="309" y="176" class="stage">接口抽象</text>
    <text x="309" y="198" class="meta">HAL / BSP / Driver / OSAL。</text>
  </g>
  <g class="float" style="animation-delay:.4s">
    <rect class="card" x="512" y="112" width="190" height="104" rx="18"/>
    <rect x="536" y="132" width="36" height="22" rx="11" fill="#E0F2FE" stroke="#22D3EE"/>
    <text x="554" y="147" text-anchor="middle" class="num">03</text>
    <text x="536" y="176" class="stage">状态实现</text>
    <text x="536" y="198" class="meta">状态机、日志、Trace 可观测。</text>
  </g>
  <g class="float" style="animation-delay:.6s">
    <rect class="card" x="739" y="112" width="190" height="104" rx="18"/>
    <rect x="763" y="132" width="36" height="22" rx="11" fill="#F0FDFA" stroke="#14B8A6"/>
    <text x="781" y="147" text-anchor="middle" class="num">04</text>
    <text x="763" y="176" class="stage">回归验证</text>
    <text x="763" y="198" class="meta">构建、测试、文档、版本归档。</text>
  </g>
  <g transform="translate(194 246)">
    <rect class="rule" width="592" height="24" rx="12"/>
    <text x="296" y="16" text-anchor="middle" class="gate">少一点堆砌，多一点工程边界；少一点玄学，多一点可验证证据。</text>
  </g>
</svg>
