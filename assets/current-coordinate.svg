<svg width="980" height="280" viewBox="0 0 980 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Current coordinate</title><desc id="desc">Spacious current coordinate panel.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="280"><stop stop-color="#EFF6FF"/><stop offset="0.5" stop-color="#F8FAFC"/><stop offset="1" stop-color="#ECFDF5"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 26px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:650 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.key{font:900 13px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}.val{font:800 15px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.card{fill:rgba(255,255,255,.88);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}.ring{stroke:#DBEAFE;stroke-width:1.2;stroke-dasharray:8 12;animation:spin 24s linear infinite;transform-origin:170px 155px}.scan{stroke:url(#flow);stroke-width:4;stroke-linecap:round;animation:scan 4s ease-in-out infinite}.dot{animation:pulse 2.2s ease-in-out infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes scan{0%,100%{opacity:.25;transform:translateX(-20px)}50%{opacity:.75;transform:translateX(20px)}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}</style></defs>
<rect x="1" y="1" width="978" height="278" rx="28" fill="url(#bg)" stroke="#E0F2FE"/>
<text x="40" y="48" class="title">Current Coordinate</text><text x="40" y="72" class="sub">GS-Paracosm · Xi'an · embedded runtime track</text>
<circle class="ring" cx="170" cy="156" r="72" fill="none"/><circle class="ring" cx="170" cy="156" r="46" fill="none" style="animation-direction:reverse;animation-duration:32s"/><path class="scan" d="M170 86 V226"/><circle class="dot" cx="170" cy="156" r="12" fill="#60A5FA"/>
<g><rect class="card" x="320" y="96" width="600" height="52" rx="16"/><text x="344" y="118" class="key">CURRENT</text><text x="444" y="119" class="val">MCU Ecosystem / EtherCAT / Bootloader / OTA</text></g>
<g><rect class="card" x="320" y="162" width="600" height="52" rx="16"/><text x="344" y="184" class="key">NEXT</text><text x="444" y="185" class="val">FOC / BLDC / CiA402 / Multi-Axis Servo</text></g>
<g><rect class="card" x="320" y="228" width="600" height="32" rx="16"/><text x="344" y="249" class="meta">LATER: ROS / ROS2 / BLE Low Power · TOOLS: C / CMake / GDB / J-Link / OpenOCD</text></g>
</svg>