<svg width="980" height="250" viewBox="0 0 980 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current coordinate panel</title>
  <desc id="desc">Animated coordinate panel showing current embedded focus and next learning directions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="0.35" stop-color="#F5F3FF"/>
      <stop offset="0.72" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-70 0;70 0;-70 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <style>
      .title { font: 800 25px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E293B; }
      .sub { font: 600 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .key { font: 800 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2563EB; }
      .value { font: 700 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .tiny { font: 600 10.5px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .card { fill: rgba(255,255,255,.82); stroke: #DBEAFE; stroke-width: 1.1; filter: drop-shadow(0 12px 20px rgba(96,165,250,.10)); }
      .ring { stroke: #DBEAFE; stroke-width: 1.2; stroke-dasharray: 8 10; animation: spin 16s linear infinite; transform-origin: 188px 134px; }
      .ring.slow { stroke: #EDE9FE; animation-duration: 24s; animation-direction: reverse; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .scan { animation: scan 3.4s ease-in-out infinite; }
      .node { animation: float 3.2s ease-in-out infinite; transform-origin: center; }
      .node:nth-of-type(2) { animation-delay: .18s; }
      .node:nth-of-type(3) { animation-delay: .36s; }
      .node:nth-of-type(4) { animation-delay: .54s; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: .36; transform: scale(1); } 50% { opacity: .72; transform: scale(1.1); } }
      @keyframes scan { 0%,100% { opacity: .25; transform: translateX(-26px); } 50% { opacity: .8; transform: translateX(26px); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
  </defs>

  <rect x="1" y="1" width="978" height="248" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <text x="40" y="43" class="title">Current Coordinate</text>
  <text x="40" y="66" class="sub">GS-Paracosm · Xi'an · embedded runtime track</text>

  <circle class="ring" cx="188" cy="142" r="72" fill="none"/>
  <circle class="ring slow" cx="188" cy="142" r="48" fill="none"/>
  <circle class="pulse" cx="188" cy="142" r="30" fill="#BFDBFE"/>
  <circle cx="188" cy="142" r="10" fill="#60A5FA"/>
  <path class="scan" d="M188 72 V212" stroke="url(#orbit)" stroke-width="4" stroke-linecap="round" opacity=".72"/>
  <text x="188" y="232" text-anchor="middle" class="tiny">MCU / EtherCAT / OTA</text>

  <g class="node">
    <rect class="card" x="318" y="84" width="280" height="58" rx="16"/>
    <text x="342" y="109" class="key">CURRENT</text>
    <text x="342" y="130" class="value">MCU Ecosystem / EtherCAT / Bootloader / OTA</text>
  </g>

  <g class="node">
    <rect class="card" x="628" y="84" width="294" height="58" rx="16"/>
    <text x="652" y="109" class="key">NEXT</text>
    <text x="652" y="130" class="value">FOC / BLDC / CiA402 / Multi-Axis Servo</text>
  </g>

  <g class="node">
    <rect class="card" x="318" y="158" width="280" height="58" rx="16"/>
    <text x="342" y="183" class="key">LATER</text>
    <text x="342" y="204" class="value">ROS / ROS2 / BLE Low Power</text>
  </g>

  <g class="node">
    <rect class="card" x="628" y="158" width="294" height="58" rx="16"/>
    <text x="652" y="183" class="key">TOOLS</text>
    <text x="652" y="204" class="value">C / CMake / GDB / J-Link / OpenOCD</text>
  </g>

  <path d="M285 142 H300" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 8">
    <animate attributeName="stroke-dashoffset" values="0;-56" dur="2.8s" repeatCount="indefinite"/>
  </path>
</svg>
