<svg width="1100" height="260" viewBox="0 0 1100 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Light anime energy circuit divider</title>
  <desc id="desc">A text-free pastel anime energy circuit divider for an embedded firmware profile.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1100" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8FC"/>
      <stop offset="0.34" stop-color="#F5FCFF"/>
      <stop offset="0.68" stop-color="#FFFDF0"/>
      <stop offset="1" stop-color="#F6FFF9"/>
    </linearGradient>
    <linearGradient id="rail" x1="92" y1="38" x2="1008" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF78B7"/>
      <stop offset="0.28" stop-color="#58C9F1"/>
      <stop offset="0.55" stop-color="#FFD66B"/>
      <stop offset="0.78" stop-color="#66DFAE"/>
      <stop offset="1" stop-color="#A997FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .dash { stroke-dasharray: 9 15; animation: dash 8s linear infinite; }
      .spark { transform-box: fill-box; transform-origin: center; animation: twinkle 2.1s ease-in-out infinite alternate; }
      .spark:nth-of-type(2n) { animation-delay: .5s; }
      .spark:nth-of-type(3n) { animation-delay: 1s; }
      .float { animation: float 4.5s ease-in-out infinite alternate; }
      @keyframes dash { to { stroke-dashoffset: -230; } }
      @keyframes twinkle { from { opacity: .32; transform: scale(.75); } to { opacity: 1; transform: scale(1.15); } }
      @keyframes float { from { transform: translateY(-4px); } to { transform: translateY(6px); } }
    </style>
  </defs>
  <rect width="1100" height="260" rx="34" fill="url(#paper)"/>
  <circle cx="118" cy="68" r="82" fill="#FFE3F0" opacity=".68"/>
  <circle cx="970" cy="76" r="86" fill="#DBF6FF" opacity=".7"/>
  <circle cx="270" cy="236" r="108" fill="#FFF1C4" opacity=".52"/>
  <circle cx="828" cy="226" r="112" fill="#DDF9EC" opacity=".56"/>
  <path class="dash" d="M96 152C242 74 382 77 548 132C712 186 846 204 1008 115" stroke="url(#rail)" stroke-width="5" stroke-linecap="round" opacity=".78"/>
  <path class="dash" d="M112 84C286 160 430 203 556 132C694 54 826 42 992 164" stroke="url(#rail)" stroke-width="4" stroke-linecap="round" opacity=".5"/>
  <g filter="url(#glow)">
    <circle class="float" cx="548" cy="132" r="42" fill="#FFFFFF" stroke="url(#rail)" stroke-width="4"/>
    <path d="M526 127h44v11h-44v-11Zm9-17h26v10h-26v-10Zm-17 40h60v10h-60v-10Z" fill="#58C9F1"/>
  </g>
  <g opacity=".82">
    <circle class="spark" cx="74" cy="92" r="4" fill="#FF78B7"/>
    <circle class="spark" cx="171" cy="190" r="5" fill="#58C9F1"/>
    <circle class="spark" cx="286" cy="66" r="4" fill="#FFD66B"/>
    <circle class="spark" cx="413" cy="211" r="4" fill="#66DFAE"/>
    <circle class="spark" cx="692" cy="62" r="5" fill="#A997FF"/>
    <circle class="spark" cx="932" cy="198" r="4" fill="#FF78B7"/>
    <path class="spark" d="M1010 107l7 18 19 7-19 7-7 19-7-19-18-7 18-7 7-18Z" fill="#58C9F1"/>
    <path class="spark" d="M228 118l6 16 17 6-17 6-6 17-6-17-16-6 16-6 6-16Z" fill="#FF78B7"/>
    <path class="spark" d="M782 186l6 15 16 6-16 6-6 16-6-16-15-6 15-6 6-15Z" fill="#FFD66B"/>
  </g>
  <g class="float" opacity=".75">
    <rect x="140" y="98" width="72" height="48" rx="16" fill="#FFFFFF" stroke="#FF78B7" stroke-width="3"/>
    <rect x="304" y="152" width="74" height="50" rx="17" fill="#FFFFFF" stroke="#FFD66B" stroke-width="3"/>
    <rect x="724" y="69" width="76" height="52" rx="18" fill="#FFFFFF" stroke="#A997FF" stroke-width="3"/>
    <rect x="885" y="139" width="76" height="52" rx="18" fill="#FFFFFF" stroke="#66DFAE" stroke-width="3"/>
  </g>
</svg>
