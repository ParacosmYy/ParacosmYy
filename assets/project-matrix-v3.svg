<svg width="980" height="380" viewBox="0 0 980 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Firmware Evidence Map</title><desc id="desc">Project evidence map for smart car firmware, secure OTA, RTOS kernel, debug tooling, bootloader, and build templates.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="980" y2="380"><stop stop-color="#E0F7FF"/><stop offset="0.34" stop-color="#F5F3FF"/><stop offset="0.68" stop-color="#F8FAFC"/><stop offset="1" stop-color="#E7FFF5"/></linearGradient><linearGradient id="edge" x1="90" y1="0" x2="890" y2="0"><stop stop-color="#60A5FA"/><stop offset="0.52" stop-color="#A78BFA"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient><style>.title{font:900 25px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#1E293B}.sub{font:650 12px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.label{font:900 16px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#0F172A}.meta{font:650 11px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#64748B}.tiny{font:900 10px 'Segoe UI','Microsoft YaHei',sans-serif;fill:#2563EB}.card{fill:rgba(255,255,255,.86);stroke:#DBEAFE;stroke-width:1.1;filter:drop-shadow(0 10px 18px rgba(96,165,250,.09))}.core{fill:rgba(248,250,252,.96);stroke:#A78BFA;stroke-width:1.6;filter:drop-shadow(0 0 18px rgba(167,139,250,.20));animation:pulse 4s ease-in-out infinite;transform-origin:center}.wire{stroke:url(#edge);stroke-width:2.1;stroke-linecap:round;stroke-dasharray:12 16;animation:flow 5.2s linear infinite;opacity:.68}.bus{stroke:#CBD5E1;stroke-width:1;stroke-dasharray:5 10;opacity:.55}.node{animation:float 4.2s ease-in-out infinite}.dot{animation:blink 2s ease-in-out infinite}@keyframes flow{to{stroke-dashoffset:-84}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.01)}}@keyframes blink{0%,100%{opacity:.38}50%{opacity:1}}</style></defs>
  <rect x="1" y="1" width="978" height="378" rx="26" fill="url(#bg)" stroke="#E0F2FE"/>
  <path class="bus" d="M42 92 H938M42 186 H938M42 280 H938"/>
  <text x="40" y="44" class="title">Firmware Evidence Map</text><text x="40" y="67" class="sub">smart car firmware / secure OTA / RTOS kernel / debug tooling / bootloader / build template</text>
  <path class="wire" d="M490 178 C408 126 340 120 270 122"/><path class="wire" d="M490 178 C572 126 640 120 710 122"/><path class="wire" d="M490 178 C406 222 336 240 260 248"/><path class="wire" d="M490 178 C574 222 644 240 720 248"/><path class="wire" d="M490 224 C490 262 490 290 490 314"/>
  <g><rect class="core" x="350" y="120" width="280" height="116" rx="22"/><circle class="dot" cx="382" cy="150" r="7" fill="#A78BFA"/><text x="490" y="154" text-anchor="middle" class="label">GS_Smart_car</text><text x="490" y="179" text-anchor="middle" class="meta">AURIX TC264D smart car firmware</text><text x="490" y="202" text-anchor="middle" class="tiny">VISION · SENSOR · PID · TARGET PORT</text></g>
  <g class="node"><rect class="card" x="70" y="88" width="250" height="78" rx="17"/><circle cx="100" cy="118" r="7" fill="#60A5FA"/><text x="122" y="123" class="label">GS_ETERNALCHIP</text><text x="100" y="147" class="meta">secure OTA / boot state machine</text></g>
  <g class="node"><rect class="card" x="660" y="88" width="250" height="78" rx="17"/><circle cx="690" cy="118" r="7" fill="#A78BFA"/><text x="712" y="123" class="label">GS_Thread</text><text x="690" y="147" class="meta">scheduler / IPC / Cortex-M port</text></g>
  <g class="node"><rect class="card" x="70" y="214" width="250" height="78" rx="17"/><circle cx="100" cy="244" r="7" fill="#22D3EE"/><text x="122" y="249" class="label">GCC_Cmake_ARM</text><text x="100" y="273" class="meta">ARM GCC / CMake / reproducible build</text></g>
  <g class="node"><rect class="card" x="660" y="214" width="250" height="78" rx="17"/><circle cx="690" cy="244" r="7" fill="#2DD4BF"/><text x="712" y="249" class="label">GS_Tool</text><text x="690" y="273" class="meta">PyQt debug tooling / CI / package</text></g>
  <g class="node"><rect class="card" x="350" y="304" width="280" height="54" rx="17"/><circle cx="382" cy="331" r="7" fill="#14B8A6"/><text x="404" y="336" class="label">GS_watch</text><text x="506" y="336" class="meta">STM32F411 IAP / app jump / flash layout</text></g>
